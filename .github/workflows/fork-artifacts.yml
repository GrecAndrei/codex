name: fork-artifacts

on:
  push:
    tags-ignore:
      - "rust-v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build artifacts - ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: codex-linux-gnu
            install_musl: false
          - target: x86_64-unknown-linux-musl
            artifact_name: codex-linux-musl
            install_musl: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev
          if [[ "${{ matrix.install_musl }}" == "true" ]]; then
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libubsan1
          fi

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Set up Zig for musl builds
        if: ${{ matrix.install_musl }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install musl build tools
        if: ${{ matrix.install_musl }}
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --target ${{ matrix.target }} --release --bin codex --bin codex-responses-api-proxy

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/${{ matrix.artifact_name }}"
          mkdir -p "$dest"
          cp "target/${{ matrix.target }}/release/codex" "$dest/"
          cp "target/${{ matrix.target }}/release/codex-responses-api-proxy" "$dest/"
          cat > "$dest/BUILD-INFO.txt" <<EOF
          repo=${GITHUB_REPOSITORY}
          ref=${GITHUB_REF}
          sha=${GITHUB_SHA}
          target=${{ matrix.target }}
          workflow=${GITHUB_WORKFLOW}
          run_id=${GITHUB_RUN_ID}
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/${{ matrix.artifact_name }}
          if-no-files-found: error
