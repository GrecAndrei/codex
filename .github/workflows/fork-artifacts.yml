name: fork-artifacts

on:
  push:
    tags-ignore:
      - "rust-v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build artifacts - ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: codex-linux-gnu
            install_musl: false
          - target: x86_64-unknown-linux-musl
            artifact_name: codex-linux-musl
            install_musl: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends pkg-config libcap-dev libubsan1

      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Use hermetic Cargo home (musl)
        if: ${{ matrix.install_musl }}
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Set up Zig for musl builds
        if: ${{ matrix.install_musl }}
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install musl build tools
        if: ${{ matrix.install_musl }}
        env:
          TARGET: ${{ matrix.target }}
        shell: bash
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rustc UBSan wrapper (musl host)
        if: ${{ matrix.install_musl }}
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "$1" "${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear sanitizer flags
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.install_musl }}" == "true" ]]; then
            echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1" >> "$GITHUB_ENV"
            target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
            target_no_jitter="${target_no_jitter//-/_}"
            echo "${target_no_jitter}=1" >> "$GITHUB_ENV"
          fi

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          echo "RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_ENCODED_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=" >> "$GITHUB_ENV"

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          echo "CFLAGS=${cflags}" >> "$GITHUB_ENV"
          echo "CXXFLAGS=${cxxflags}" >> "$GITHUB_ENV"

      - name: Build release binaries
        shell: bash
        run: |
          set -euo pipefail
          cargo build --target ${{ matrix.target }} --release --bin codex --bin codex-responses-api-proxy

      - name: Stage artifacts
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/${{ matrix.artifact_name }}"
          mkdir -p "$dest"
          cp "target/${{ matrix.target }}/release/codex" "$dest/"
          cp "target/${{ matrix.target }}/release/codex-responses-api-proxy" "$dest/"
          cat > "$dest/BUILD-INFO.txt" <<EOF
          repo=${GITHUB_REPOSITORY}
          ref=${GITHUB_REF}
          sha=${GITHUB_SHA}
          target=${{ matrix.target }}
          workflow=${GITHUB_WORKFLOW}
          run_id=${GITHUB_RUN_ID}
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ runner.temp }}/${{ matrix.artifact_name }}
          if-no-files-found: error
